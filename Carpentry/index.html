<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #000;
      color: #ddd;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      margin: 0;
    }

    h1 {
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }

    p {
      color: #aaa;
      max-width: 500px;
      margin: 1rem auto;
      font-size: 1.1rem;
    }

    .spinner-border {
      color: #0dcaf0;
      width: 3rem;
      height: 3rem;
      margin-bottom: 1.5rem;
    }

    a.btn-outline-info {
      margin-top: 2rem;
      border-radius: 50px;
      padding: 0.5rem 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    footer {
      position: absolute;
      bottom: 15px;
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>

<body>
  <main>

    <h1>P O L Y M A T – Carpentry</h1>
    <p>This section of the P O L Y M A T project is currently under construction.<br>
      Check back soon for updates.</p>

    <a href="http://polymat.ie" class="btn btn-outline-info">Back to Polymat</a>

  </main>

  <footer>
        <!-- Contact Me Section (Full Width) -->
<section id="contact" class="bg-dark text-light py-5">
  <div class="container">
    <h2 class="text-center mb-4">CONTACT</h2>
    <p class="text-center mb-4">Want to work together, commission a project, or ask a question? Send me a message below.</p>
    <div class="row justify-content-center">
      <div class="col-12 col-md-8">
        <form action="https://formspree.io/f/xeorkebr" method="POST" class="p-4 bg-black border border-secondary rounded">
          <div class="mb-3">
            <input type="text" name="name" class="form-control" placeholder="Your Name" required>
          </div>
          <div class="mb-3">
            <input type="email" name="_replyto" class="form-control" placeholder="Your Email" required>
          </div>
          <div class="mb-3">
            <textarea name="message" class="form-control" rows="4" placeholder="Your Message" required></textarea>
          </div>
          <button type="submit" class="btn btn-info w-100">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</section>
    © 2025 Mat Warren — P O L Y M A T
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
